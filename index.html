<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bất Phàm TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#14141c;
    --bg-alt:#1b1b26;
    --card:#20202f;
    --jade:#3f9c76;
    --jade-soft:#2b6650;
    --vermillion:#c23b34;
    --parchment:#ede6d6;
    --muted:#8f899e;
    --line:#2c2c3d;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--parchment);
    font-family:'Be Vietnam Pro',sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--vermillion);color:#fff;}

  header{
    padding:64px 24px 48px;
    text-align:center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(63,156,118,0.14), transparent 60%),
      var(--bg);
    border-bottom:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  header::before{
    content:"卷";
    position:absolute;
    font-family:'Ma Shan Zheng',cursive;
    font-size:280px;
    color:rgba(194,59,52,0.05);
    top:-60px;
    right:-20px;
    line-height:1;
    pointer-events:none;
  }
  .brand{
    font-family:'Dancing Script',cursive;
    font-weight:700;
    font-size:clamp(46px,9vw,72px);
    color:var(--parchment);
    letter-spacing:0.5px;
  }
  .brand span{color:var(--vermillion);}
  .tagline{
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
    letter-spacing:0.5px;
  }
  .seal-rule{
    display:flex;align-items:center;gap:12px;
    justify-content:center;
    margin-top:22px;
  }
  .seal-rule .line{width:40px;height:1px;background:var(--line);}
  .seal-rule .dot{width:6px;height:6px;border-radius:50%;background:var(--jade);}

  main{max-width:1080px;margin:0 auto;padding:40px 20px 100px;}

  #loading, #empty{
    text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;
  }

  .search-wrap{
    max-width:420px;
    margin:0 auto 32px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--parchment);
    font-family:'Be Vietnam Pro',sans-serif;
    font-size:14px;
    padding:12px 16px 12px 40px;
    border-radius:100px;
    outline:none;
    transition:border-color .2s ease;
  }
  .search-wrap input::placeholder{color:var(--muted);}
  .search-wrap input:focus{border-color:var(--jade);}
  .search-wrap .icon{
    position:absolute;left:15px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:14px;pointer-events:none;
  }
  #no-results{
    display:none;text-align:center;color:var(--muted);padding:40px 20px;font-size:13px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(128px,150px));
    justify-content:center;
    gap:16px;
  }

  .scroll-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    position:relative;
  }
  .scroll-card:hover{
    transform:translateY(-4px) scaleY(1.015);
    box-shadow:0 16px 32px rgba(0,0,0,0.4);
    border-color:var(--jade-soft);
  }
  .scroll-cover{
    aspect-ratio:3/4;
    background:linear-gradient(160deg,#2a2a3d,#1b1b26);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .scroll-cover img{width:100%;height:100%;object-fit:cover;}
  .scroll-cover .glyph{
    font-family:'Ma Shan Zheng',cursive;
    font-size:56px;
    color:rgba(237,230,214,0.15);
  }
  .status-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:10px;font-weight:700;letter-spacing:0.3px;
    padding:4px 10px;border-radius:100px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(2px);
  }
  .status-badge .dot{
    width:7px;height:7px;border-radius:50%;
    animation:pulse-glow 1.8s ease-in-out infinite;
  }
  .status-done{color:#5fd3a0;}
  .status-done .dot{background:var(--jade);box-shadow:0 0 8px 2px var(--jade);}
  .status-updating{color:#f0c05a;}
  .status-updating .dot{background:#e0a83d;box-shadow:0 0 8px 2px #e0a83d;}
  .status-stopped{color:#f0847d;}
  .status-stopped .dot{background:var(--vermillion);box-shadow:0 0 8px 2px var(--vermillion);}
  @keyframes pulse-glow{0%,100%{opacity:1;}50%{opacity:0.35;}}
  @media (prefers-reduced-motion:reduce){
    .status-badge .dot{animation:none;}
  }
  .status-badge-pos{position:absolute;top:8px;left:8px;}

  .player-status{margin-bottom:10px;}

  .ep-badge{
    position:absolute;top:8px;right:8px;
    background:var(--vermillion);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:3px 8px;
    border-radius:100px;
    letter-spacing:0.3px;
  }
  .scroll-info{padding:12px 14px 16px;}
  .scroll-info .code{
    font-size:10px;
    color:var(--jade);
    font-weight:700;
    letter-spacing:0.5px;
    margin-bottom:3px;
  }
  .scroll-info h3{
    font-size:14px;
    font-weight:600;
    line-height:1.35;
    color:var(--parchment);
  }
  .scroll-info p{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  /* ---- Player view ---- */
  #player-view{display:none;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:none;border:none;color:var(--muted);
    font-family:inherit;font-size:14px;cursor:pointer;
    padding:8px 0;margin-bottom:20px;
  }
  .back-btn:hover{color:var(--parchment);}

  .player-title{
    font-family:'Ma Shan Zheng',cursive;
    font-size:32px;
    color:var(--parchment);
    margin-bottom:6px;
  }
  .player-desc{color:var(--muted);font-size:13px;margin-bottom:24px;max-width:640px;}

  video{
    width:100%;
    max-height:70vh;
    background:#000;
    border-radius:8px;
    border:1px solid var(--line);
  }

  .ep-list{
    margin-top:24px;
    display:flex;flex-wrap:wrap;gap:10px;
  }
  .ep-pill{
    display:flex;align-items:center;gap:8px;
    background:var(--card);
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:100px;
    cursor:pointer;
    font-size:13px;
    color:var(--muted);
    transition:all .2s ease;
  }
  .ep-pill .num{
    width:20px;height:20px;border-radius:50%;
    background:var(--jade-soft);
    color:var(--parchment);
    font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .ep-pill:hover{border-color:var(--jade);color:var(--parchment);}
  .ep-pill.active{
    background:var(--jade-soft);
    border-color:var(--jade);
    color:#fff;
  }
  .ep-pill.active .num{background:var(--vermillion);}

  footer{
    text-align:center;padding:30px;color:var(--muted);font-size:12px;
    border-top:1px solid var(--line);
  }

  @media (prefers-reduced-motion:reduce){
    .scroll-card{transition:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">Bất Phàm <span>TV</span></div>
  <div class="tagline">Vietsub truyện tranh hoạt hình Trung Quốc — xem trọn bộ, không cần tìm kiếm</div>
  <div class="seal-rule"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
</header>

<main>
  <div id="library-view">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="search-input" placeholder="Nhập tên hoặc mã phim" oninput="filterSeries()">
    </div>
    <div id="loading">Đang tải danh sách phim...</div>
    <div id="empty" style="display:none;">Chưa có bộ phim nào được đăng.</div>
    <div id="no-results">Không tìm thấy phim phù hợp.</div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="player-view">
    <button class="back-btn" onclick="backToLibrary()">← Quay lại danh sách</button>
    <div class="player-title" id="player-title"></div>
    <div class="player-status" id="player-status"></div>
    <div class="player-desc" id="player-desc"></div>
    <video id="video" controls playsinline></video>
    <div class="ep-list" id="ep-list"></div>
  </div>
</main>

<footer>© Bất Phàm TV — nội dung vietsub từ TikTok, tổng hợp để xem liền mạch</footer>

<script>
  const SUPABASE_URL = "https://qaddfutlbvlzeklbiaad.supabase.co";
  const SUPABASE_KEY = "sb_publishable_x2yfVfz3agesn97XPFXUeQ_YEVHp-VV";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const grid = document.getElementById('grid');
  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');
  let seriesData = [];

  async function loadLibrary(){
    const { data: series, error } = await sb.from('series').select('*').order('created_at', {ascending:false});
    loadingEl.style.display = 'none';
    if(error){
      emptyEl.textContent = 'Có lỗi khi tải dữ liệu. Thử tải lại trang.';
      emptyEl.style.display='block';
      console.error(error);
      return;
    }
    if(!series || series.length === 0){
      emptyEl.style.display = 'block';
      return;
    }
    seriesData = series;

    // lấy số tập cho từng series
    const { data: episodes } = await sb.from('episodes').select('series_id');
    countMap = {};
    (episodes||[]).forEach(e=>{ countMap[e.series_id] = (countMap[e.series_id]||0)+1; });

    renderGrid(seriesData);
  }

  let countMap = {};

  const STATUS_LABEL = { done:'Đã xong', updating:'Đang cập nhật', stopped:'Ngưng cập nhật' };
  function statusBadgeHtml(status, extraClass){
    const s = status || 'updating';
    const label = STATUS_LABEL[s] || STATUS_LABEL.updating;
    return `<div class="status-badge status-${s} ${extraClass||''}"><span class="dot"></span>${label}</div>`;
  }

  function renderGrid(list){
    const noResults = document.getElementById('no-results');
    if(list.length === 0){
      grid.innerHTML = '';
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';
    grid.innerHTML = list.map(s => `
      <div class="scroll-card" onclick="openSeries('${s.id}')">
        <div class="scroll-cover">
          ${s.cover_url ? `<img src="${escapeAttr(s.cover_url)}" alt="">` : `<div class="glyph">卷</div>`}
          ${statusBadgeHtml(s.status, 'status-badge-pos')}
          <div class="ep-badge">${countMap[s.id]||0} tập</div>
        </div>
        <div class="scroll-info">
          ${s.code ? `<div class="code">${escapeHtml(s.code)}</div>` : ''}
          <h3>${escapeHtml(s.title)}</h3>
          ${s.description ? `<p>${escapeHtml(s.description)}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function removeDiacritics(str){
    return (str||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/gi,'d').toLowerCase();
  }

  function filterSeries(){
    const q = removeDiacritics(document.getElementById('search-input').value.trim());
    if(!q){ renderGrid(seriesData); return; }
    const filtered = seriesData.filter(s =>
      removeDiacritics(s.title).includes(q) || removeDiacritics(s.code).includes(q)
    );
    renderGrid(filtered);
  }

  async function openSeries(seriesId){
    const s = seriesData.find(x=>x.id===seriesId);
    const { data: episodes, error } = await sb.from('episodes')
      .select('*').eq('series_id', seriesId).order('episode_number', {ascending:true});
    if(error || !episodes || episodes.length===0){
      alert('Bộ này chưa có tập nào.');
      return;
    }

    document.getElementById('library-view').style.display='none';
    document.getElementById('player-view').style.display='block';
    document.getElementById('player-title').textContent = s.title;
    document.getElementById('player-status').innerHTML = statusBadgeHtml(s.status);
    document.getElementById('player-desc').textContent = s.description || '';

    const epList = document.getElementById('ep-list');
    epList.innerHTML = episodes.map((e,i)=>`
      <div class="ep-pill" data-idx="${i}" onclick="playEpisode(${JSON.stringify(episodes).replace(/"/g,'&quot;')}, ${i})">
        <span class="num">${e.episode_number}</span>
        <span>${e.title ? escapeHtml(e.title) : 'Tập ' + e.episode_number}</span>
      </div>
    `).join('');

    playEpisode(episodes, 0);
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function playEpisode(episodes, idx){
    const e = episodes[idx];
    const video = document.getElementById('video');
    video.src = e.video_url;
    video.play().catch(()=>{});
    document.querySelectorAll('.ep-pill').forEach((el,i)=>{
      el.classList.toggle('active', i===idx);
    });
  }

  function backToLibrary(){
    document.getElementById('video').pause();
    document.getElementById('player-view').style.display='none';
    document.getElementById('library-view').style.display='block';
  }

  function escapeHtml(str){
    return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  loadLibrary();
</script>
</body>
</html>
