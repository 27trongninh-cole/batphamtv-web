<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bất Phàm TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#14141c;
    --bg-alt:#1b1b26;
    --card:#20202f;
    --jade:#3f9c76;
    --jade-soft:#2b6650;
    --vermillion:#c23b34;
    --parchment:#ede6d6;
    --muted:#8f899e;
    --line:#2c2c3d;
  }
  body.light-theme{
    --bg:#f7f3ea;
    --bg-alt:#efe8d8;
    --card:#ffffff;
    --jade:#2f7a5c;
    --jade-soft:#3f9c76;
    --vermillion:#c23b34;
    --parchment:#241f1a;
    --muted:#78715f;
    --line:#e2d9c4;
  }
  body.light-theme .ep-pill.active .num,
  body.light-theme .status-badge .dot{box-shadow:none;}
  body.light-theme header::before{color:rgba(194,59,52,0.06);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--parchment);
    font-family:'Be Vietnam Pro',sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--vermillion);color:#fff;}

  header{
    padding:56px 24px 44px;
    text-align:center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(63,156,118,0.14), transparent 60%),
      var(--bg);
    border-bottom:1px solid var(--line);
    position:relative;
    overflow:hidden;
    transition:padding .3s ease;
  }
  header.compact{
    padding:12px 24px;
    text-align:left;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  header.compact .brand{
    font-size:22px;
    letter-spacing:0.3px;
    flex:1;
    order:1;
  }
  header.compact .header-actions{
    order:2;
  }
  header.compact .tagline,
  header.compact .seal-rule{
    display:none;
  }
  header.compact::before{opacity:0.3;font-size:120px;top:-30px;right:-10px;}
  header::before{
    content:"卷";
    position:absolute;
    font-family:'Ma Shan Zheng',cursive;
    font-size:280px;
    color:rgba(194,59,52,0.05);
    top:-60px;
    right:-20px;
    line-height:1;
    pointer-events:none;
  }
  .brand{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:700;
    font-size:clamp(36px,7vw,56px);
    color:var(--parchment);
    letter-spacing:0.5px;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .brand span{color:var(--vermillion);}
  .tagline{
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
    letter-spacing:0.5px;
    text-align:center;
  }
  .seal-rule{
    display:flex;align-items:center;gap:12px;
    justify-content:center;
    margin-top:22px;
  }
  .seal-rule .line{width:40px;height:1px;background:var(--line);}
  .seal-rule .dot{width:6px;height:6px;border-radius:50%;background:var(--jade);}

  .header-actions{
    display:flex;align-items:center;gap:10px;
    flex-shrink:0;
    position:absolute;
    top:20px;right:24px;
    z-index:2;
  }
  header.compact .header-actions{
    position:static;
  }

  .mini-search{
    position:relative;
    flex-shrink:1;
    min-width:0;
    display:none;
  }
  header.compact .mini-search{
    display:block;
  }
  .mini-search input{
    width:100%;
    max-width:130px;
    min-width:80px;
    box-sizing:border-box;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--parchment);
    font-family:'Be Vietnam Pro',sans-serif;
    font-size:12.5px;
    padding:8px 12px 8px 30px;
    border-radius:100px;
    outline:none;
    transition:border-color .2s ease;
  }
  .mini-search input:focus{border-color:var(--jade);}
  .mini-search input::placeholder{color:var(--muted);}
  .mini-search .icon{
    position:absolute;left:11px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:12px;pointer-events:none;
  }
  .search-dropdown{
    display:none;
    position:absolute;
    top:calc(100% + 8px);
    right:0;
    width:260px;
    max-height:320px;
    overflow-y:auto;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:0 16px 36px rgba(0,0,0,0.5);
    z-index:50;
  }
  .search-dropdown.show{display:block;}
  .search-dropdown .sd-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;
    cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .search-dropdown .sd-item:last-child{border-bottom:none;}
  .search-dropdown .sd-item:hover{background:var(--bg-alt);}
  .search-dropdown .sd-thumb{
    width:32px;height:42px;border-radius:4px;
    background:var(--bg-alt);
    object-fit:cover;flex-shrink:0;
  }
  .search-dropdown .sd-info .sd-code{font-size:10px;color:var(--jade);font-weight:700;}
  .search-dropdown .sd-info .sd-title{font-size:12.5px;color:var(--parchment);line-height:1.3;}
  .search-dropdown .sd-empty{padding:16px;text-align:center;color:var(--muted);font-size:12.5px;}

  .theme-btn{
    width:34px;height:34px;
    border-radius:50%;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--parchment);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:border-color .2s ease, color .2s ease;
  }
  .theme-btn:hover{border-color:var(--jade);color:var(--jade);}
  .theme-btn .hidden{display:none;}

  main{max-width:1080px;margin:0 auto;padding:40px 20px 100px;}

  .search-wrap{
    max-width:420px;
    margin:0 auto 32px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--parchment);
    font-family:'Be Vietnam Pro',sans-serif;
    font-size:14px;
    padding:12px 16px 12px 40px;
    border-radius:100px;
    outline:none;
    transition:border-color .2s ease;
  }
  .search-wrap input::placeholder{color:var(--muted);}
  .search-wrap input:focus{border-color:var(--jade);}
  .search-wrap .icon{
    position:absolute;left:15px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-size:14px;pointer-events:none;
  }

  #loading, #empty{
    text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;
  }

  #no-results{
    display:none;text-align:center;color:var(--muted);padding:40px 20px;font-size:13px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(128px,150px));
    justify-content:center;
    gap:16px;
  }

  .scroll-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    position:relative;
  }
  .scroll-card:hover{
    transform:translateY(-4px) scaleY(1.015);
    box-shadow:0 16px 32px rgba(0,0,0,0.4);
    border-color:var(--jade-soft);
  }
  .scroll-cover{
    aspect-ratio:3/4;
    background:linear-gradient(160deg,#2a2a3d,#1b1b26);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .scroll-cover img, .scroll-cover video{width:100%;height:100%;object-fit:cover;}
  .scroll-cover .glyph{
    font-family:'Ma Shan Zheng',cursive;
    font-size:56px;
    color:rgba(237,230,214,0.15);
  }
  .title-ribbon{
    position:absolute;
    bottom:10%;left:50%;
    transform:translateX(-50%) rotate(-6deg);
    width:128%;
    background:linear-gradient(90deg, var(--vermillion), #8a2c26);
    color:#fff;
    text-align:center;
    font-size:10.5px;
    font-weight:700;
    line-height:1.3;
    padding:5px 10px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    text-overflow:ellipsis;
    box-shadow:0 6px 14px rgba(0,0,0,0.45);
    letter-spacing:0.2px;
    z-index:1;
  }
  .status-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:10px;font-weight:700;letter-spacing:0.3px;
    padding:4px 10px;border-radius:100px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(2px);
  }
  .status-badge .dot{
    width:7px;height:7px;border-radius:50%;
    animation:pulse-glow 1.8s ease-in-out infinite;
  }
  .status-done{color:#5fd3a0;}
  .status-done .dot{background:var(--jade);box-shadow:0 0 8px 2px var(--jade);}
  .status-updating{color:#f0c05a;}
  .status-updating .dot{background:#e0a83d;box-shadow:0 0 8px 2px #e0a83d;}
  .status-stopped{color:#f0847d;}
  .status-stopped .dot{background:var(--vermillion);box-shadow:0 0 8px 2px var(--vermillion);}
  @keyframes pulse-glow{0%,100%{opacity:1;}50%{opacity:0.35;}}
  @media (prefers-reduced-motion:reduce){
    .status-badge .dot{animation:none;}
  }
  .status-badge-pos{position:absolute;top:8px;left:8px;}

  .player-status{flex-shrink:0;}

  .ep-badge{
    position:absolute;top:8px;right:8px;
    background:var(--vermillion);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:3px 8px;
    border-radius:100px;
    letter-spacing:0.3px;
  }
  .scroll-info{padding:12px 14px 16px;}
  .scroll-info .code-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:3px;
  }
  .scroll-info .code{
    font-size:10px;
    color:var(--jade);
    font-weight:700;
    letter-spacing:0.5px;
  }
  .scroll-info .views{
    font-size:10px;
    color:var(--muted);
  }
  .scroll-info h3{
    font-size:14px;
    font-weight:600;
    line-height:1.35;
    color:var(--parchment);
  }
  .scroll-info p{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  /* ---- Player view ---- */
  #player-view{display:none;}
  .back-icon-btn{
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    background:none;border:1px solid var(--line);color:var(--muted);
    cursor:pointer;border-radius:50%;
    flex-shrink:0;
    transition:all .2s ease;
  }
  .back-icon-btn:hover{color:var(--parchment);border-color:var(--jade);}

  .player-panel{
    background:linear-gradient(180deg, var(--card), var(--bg-alt));
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    box-shadow:0 24px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .player-header{
    display:flex;align-items:center;gap:10px;
    margin-bottom:14px;
  }
  .player-heading{flex:1;min-width:0;}
  .player-heading .code-tag{
    display:inline-block;font-size:10.5px;font-weight:700;color:var(--jade);
    letter-spacing:0.5px;margin-bottom:2px;
  }
  .player-title{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:700;
    font-size:18px;
    color:var(--parchment);
    line-height:1.3;
  }
  .player-desc{color:var(--muted);font-size:13px;margin-top:10px;max-width:640px;}

  #player-container{
    border-radius:10px;
    overflow:hidden;
    background:#000;
    display:flex;
    justify-content:center;
  }
  video{
    display:block;
    width:auto;
    height:auto;
    max-width:100%;
    max-height:75vh;
    object-fit:contain;
    background:#000;
  }
  iframe.player-frame{
    display:block;
    width:100%;
    height:min(75vh,560px);
    min-height:260px;
    background:#000;
    border:none;
  }

  .custom-controls{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--bg-alt);
    border:1px solid var(--line);
    border-radius:10px;
    padding:6px 10px;
    margin-top:8px;
    width:100%;
    box-sizing:border-box;
  }
  .cc-btn{
    background:none;border:none;color:var(--parchment);
    cursor:pointer;
    flex-shrink:0;
    width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;
    border-radius:6px;
    transition:color .2s ease, background .2s ease;
  }
  .cc-btn:hover{color:var(--jade);background:rgba(63,156,118,0.12);}
  .cc-btn svg{display:block;flex-shrink:0;}
  .cc-btn .hidden{display:none;}
  .cc-time{
    font-size:11px;color:var(--muted);
    flex-shrink:0;min-width:76px;font-variant-numeric:tabular-nums;
  }
  .cc-seek{
    flex:1;
    min-width:0;
    -webkit-appearance:none;
    appearance:none;
    height:4px;
    border-radius:100px;
    background:var(--line);
    outline:none;
    cursor:pointer;
  }
  .cc-seek::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:13px;height:13px;border-radius:50%;
    background:var(--jade);
    cursor:pointer;
    box-shadow:0 0 6px rgba(63,156,118,0.6);
  }
  .cc-seek::-moz-range-thumb{
    width:13px;height:13px;border-radius:50%;
    background:var(--jade);border:none;cursor:pointer;
  }
  .ep-list-label{
    font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:0.8px;margin:22px 0 10px;
  }
  .ep-list{
    display:flex;flex-wrap:wrap;gap:8px;
  }
  .ep-pill{
    display:flex;align-items:center;gap:8px;
    background:var(--bg-alt);
    border:1px solid var(--line);
    padding:7px 14px 7px 7px;
    border-radius:100px;
    cursor:pointer;
    font-size:13px;
    color:var(--muted);
    transition:all .2s ease;
  }
  .ep-pill .num{
    width:22px;height:22px;border-radius:50%;
    background:var(--jade-soft);
    color:var(--parchment);
    font-size:11px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .ep-pill:hover{border-color:var(--jade);color:var(--parchment);transform:translateY(-1px);}
  .ep-pill.active{
    background:var(--jade-soft);
    border-color:var(--jade);
    color:#fff;
    box-shadow:0 6px 16px rgba(63,156,118,0.35);
  }
  .ep-pill.active .num{background:var(--vermillion);color:#fff;}

  #toast{
    position:fixed;
    bottom:24px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--card);
    border:1px solid var(--jade-soft);
    color:var(--parchment);
    padding:12px 20px;
    border-radius:8px;
    font-size:13px;
    box-shadow:0 12px 28px rgba(0,0,0,0.5);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:100;
    max-width:90vw;
    text-align:center;
  }
  #toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  footer{
    text-align:center;padding:30px;color:var(--muted);font-size:12px;
    border-top:1px solid var(--line);
  }

  @media (prefers-reduced-motion:reduce){
    .scroll-card{transition:none;}
  }
</style>
</head>
<body>

<header id="site-header">
  <div class="header-actions">
    <div class="mini-search">
      <span class="icon">🔍</span>
      <input type="text" id="search-input-header" placeholder="Tên hoặc mã phim" oninput="filterHeaderSearch()">
      <div id="search-dropdown" class="search-dropdown"></div>
    </div>
    <button id="theme-toggle" class="theme-btn" aria-label="Đổi giao diện sáng/tối">
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>
  <div class="brand">Bất Phàm <span>TV</span></div>
  <div class="tagline">Vietsub truyện tranh hoạt hình Trung Quốc — xem trọn bộ, không cần tìm kiếm</div>
  <div class="seal-rule"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
</header>

<main>
  <div id="library-view">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="search-input-lib" placeholder="Nhập tên hoặc mã phim" oninput="filterLibrarySearch()">
    </div>
    <div id="loading">Đang tải danh sách phim...</div>
    <div id="empty" style="display:none;">Chưa có bộ phim nào được đăng.</div>
    <div id="no-results">Không tìm thấy phim phù hợp.</div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="player-view">
    <div class="player-panel">
      <div class="player-header">
        <button class="back-icon-btn" onclick="backToLibrary()" aria-label="Quay lại danh sách">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="player-heading">
          <div class="code-tag" id="player-code"></div>
          <div class="player-title" id="player-title"></div>
        </div>
        <div class="player-status" id="player-status"></div>
      </div>
      <div class="player-desc" id="player-desc"></div>
      <div id="player-container" style="margin-top:16px;"></div>
      <div class="custom-controls" id="custom-controls" style="display:none;">
        <button id="cc-playpause" class="cc-btn" aria-label="Phát/Dừng">
          <svg class="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause hidden" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
        </button>
        <span id="cc-time" class="cc-time">0:00 / 0:00</span>
        <input type="range" id="cc-seek" class="cc-seek" min="0" max="100" value="0" step="0.1">
        <button id="cc-mute" class="cc-btn" aria-label="Âm thanh">
          <svg class="icon-vol-on" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12a4.5 4.5 0 0 0-2.3-3.9v7.8a4.5 4.5 0 0 0 2.3-3.9z"/></svg>
          <svg class="icon-vol-off hidden" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M19 9l-3 3m0-3l3 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <button id="cc-fullscreen" class="cc-btn" aria-label="Toàn màn hình">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        </button>
      </div>
      <div class="ep-list-label">Danh sách tập</div>
      <div class="ep-list" id="ep-list"></div>
    </div>
  </div>
</main>

<footer>© Bất Phàm TV — nội dung vietsub từ TikTok, tổng hợp để xem liền mạch</footer>
<div id="toast"></div>

<script>
  const SUPABASE_URL = "https://qaddfutlbvlzeklbiaad.supabase.co";
  const SUPABASE_KEY = "sb_publishable_x2yfVfz3agesn97XPFXUeQ_YEVHp-VV";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const grid = document.getElementById('grid');
  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');
  let seriesData = [];

  async function loadLibrary(){
    const { data: series, error } = await sb.from('series').select('*').order('created_at', {ascending:false});
    loadingEl.style.display = 'none';
    if(error){
      emptyEl.textContent = 'Có lỗi khi tải dữ liệu. Thử tải lại trang.';
      emptyEl.style.display='block';
      console.error(error);
      return;
    }
    if(!series || series.length === 0){
      emptyEl.style.display = 'block';
      return;
    }
    seriesData = series;

    // lấy toàn bộ tập để đếm số tập + lấy video tập 1 làm fallback thumbnail
    const { data: episodes } = await sb.from('episodes').select('series_id, episode_number, video_url').order('episode_number', {ascending:true});
    countMap = {};
    firstEpUrlMap = {};
    (episodes||[]).forEach(e=>{
      countMap[e.series_id] = (countMap[e.series_id]||0)+1;
      if(!(e.series_id in firstEpUrlMap)) firstEpUrlMap[e.series_id] = e.video_url;
    });

    renderGrid(seriesData);
  }

  let countMap = {};
  let firstEpUrlMap = {};

  function isDirectVideoUrl(url){
    return !!url && !url.includes('drive.google.com');
  }

  const STATUS_LABEL = { done:'Đã xong', updating:'Đang cập nhật', stopped:'Ngưng cập nhật' };
  function statusBadgeHtml(status, extraClass){
    const s = status || 'updating';
    const label = STATUS_LABEL[s] || STATUS_LABEL.updating;
    return `<div class="status-badge status-${s} ${extraClass||''}"><span class="dot"></span>${label}</div>`;
  }

  function renderGrid(list){
    const noResults = document.getElementById('no-results');
    if(list.length === 0){
      grid.innerHTML = '';
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';
    grid.innerHTML = list.map(s => {
      let coverHtml;
      if(s.cover_url){
        coverHtml = `<img src="${escapeAttr(s.cover_url)}" alt="">`;
      } else if(isDirectVideoUrl(firstEpUrlMap[s.id])){
        coverHtml = `<video src="${escapeAttr(firstEpUrlMap[s.id])}" muted preload="metadata" playsinline></video>`;
      } else {
        coverHtml = `<div class="glyph">卷</div>`;
      }
      return `
      <div class="scroll-card" onclick="openSeries('${s.id}')">
        <div class="scroll-cover">
          ${coverHtml}
          <div class="title-ribbon">${escapeHtml(s.title)}</div>
          ${statusBadgeHtml(s.status, 'status-badge-pos')}
          <div class="ep-badge">${countMap[s.id]||0} tập</div>
        </div>
        <div class="scroll-info">
          <div class="code-row">
            ${s.code ? `<span class="code">${escapeHtml(s.code)}</span>` : ''}
            <span class="views">👁 ${s.views||0}</span>
          </div>
          <h3>${escapeHtml(s.title)}</h3>
          ${s.description ? `<p>${escapeHtml(s.description)}</p>` : ''}
        </div>
      </div>
    `;
    }).join('');
  }

  function removeDiacritics(str){
    return (str||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/gi,'d').toLowerCase();
  }

  function filterLibrarySearch(){
    const q = removeDiacritics(document.getElementById('search-input-lib').value.trim());
    if(!q){ renderGrid(seriesData); return; }
    const filtered = seriesData.filter(s =>
      removeDiacritics(s.title).includes(q) || removeDiacritics(s.code).includes(q)
    );
    renderGrid(filtered);
  }

  function filterHeaderSearch(){
    const q = removeDiacritics(document.getElementById('search-input-header').value.trim());
    const dropdown = document.getElementById('search-dropdown');
    if(!q){ dropdown.classList.remove('show'); return; }
    const filtered = seriesData.filter(s =>
      removeDiacritics(s.title).includes(q) || removeDiacritics(s.code).includes(q)
    );
    renderSearchDropdown(filtered);
  }

  function renderSearchDropdown(list){
    const dropdown = document.getElementById('search-dropdown');
    if(list.length === 0){
      dropdown.innerHTML = `<div class="sd-empty">Không tìm thấy phim phù hợp.</div>`;
    } else {
      dropdown.innerHTML = list.slice(0,8).map(s => {
        const thumb = s.cover_url ? `<img class="sd-thumb" src="${escapeAttr(s.cover_url)}" alt="">` : `<div class="sd-thumb"></div>`;
        return `
        <div class="sd-item" onclick="selectSearchResult('${s.id}')">
          ${thumb}
          <div class="sd-info">
            ${s.code ? `<div class="sd-code">${escapeHtml(s.code)}</div>` : ''}
            <div class="sd-title">${escapeHtml(s.title)}</div>
          </div>
        </div>`;
      }).join('');
    }
    dropdown.classList.add('show');
  }

  function selectSearchResult(seriesId){
    document.getElementById('search-dropdown').classList.remove('show');
    document.getElementById('search-input-header').value = '';
    openSeries(seriesId);
  }

  // Đóng dropdown khi bấm ra ngoài
  document.addEventListener('click', (e)=>{
    const wrap = document.querySelector('.mini-search');
    if(wrap && !wrap.contains(e.target)){
      document.getElementById('search-dropdown').classList.remove('show');
    }
  });

  // ---- Theme sáng/tối ----
  function applyTheme(theme){
    document.body.classList.toggle('light-theme', theme === 'light');
    document.querySelector('.theme-btn .icon-moon').classList.toggle('hidden', theme === 'light');
    document.querySelector('.theme-btn .icon-sun').classList.toggle('hidden', theme !== 'light');
  }
  const savedTheme = localStorage.getItem('bptv_theme') || 'dark';
  applyTheme(savedTheme);
  document.getElementById('theme-toggle').addEventListener('click', ()=>{
    const isLight = document.body.classList.contains('light-theme');
    const next = isLight ? 'dark' : 'light';
    applyTheme(next);
    localStorage.setItem('bptv_theme', next);
  });

  let toastTimer;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
  }

  async function openSeries(seriesId){
    const s = seriesData.find(x=>x.id===seriesId);
    const { data: episodes, error } = await sb.from('episodes')
      .select('*').eq('series_id', seriesId).order('episode_number', {ascending:true});
    if(error || !episodes || episodes.length===0){
      showToast('Bộ này chưa có tập nào, quay lại sau nhé!');
      return;
    }

    document.getElementById('library-view').style.display='none';
    document.getElementById('player-view').style.display='block';
    document.getElementById('site-header').classList.add('compact');
    document.getElementById('player-code').textContent = s.code || '';
    document.getElementById('player-title').textContent = s.title;
    document.getElementById('player-status').innerHTML = statusBadgeHtml(s.status);
    document.getElementById('player-desc').textContent = s.description || '';

    // Ghi nhận lượt xem (click mở bộ phim), không chặn giao diện
    s.views = (s.views||0) + 1;
    sb.from('series').update({ views: s.views }).eq('id', seriesId).then(()=>{}).catch(()=>{});

    const epList = document.getElementById('ep-list');
    epList.innerHTML = episodes.map((e,i)=>`
      <div class="ep-pill" data-idx="${i}" onclick="playEpisode(${JSON.stringify(episodes).replace(/"/g,'&quot;')}, ${i})">
        <span class="num">${e.episode_number}</span>
        <span>${e.title ? escapeHtml(e.title) : 'Tập ' + e.episode_number}</span>
      </div>
    `).join('');

    playEpisode(episodes, 0);
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function formatTime(sec){
    if(!isFinite(sec) || sec<0) sec = 0;
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return m + ':' + String(s).padStart(2,'0');
  }

  function renderPlayer(url, episodes, idx){
    const container = document.getElementById('player-container');
    const ccBar = document.getElementById('custom-controls');
    const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(driveMatch){
      const fileId = driveMatch[1];
      container.innerHTML = `<iframe class="player-frame" src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" allowfullscreen frameborder="0"></iframe>`;
      ccBar.style.display = 'none';
    } else {
      container.innerHTML = `<video id="video" playsinline></video>`;
      const video = document.getElementById('video');
      video.src = url;
      ccBar.style.display = 'flex';
      setupCustomControls(video, episodes, idx);
      video.play().catch(()=>{});
    }
  }

  function setupCustomControls(video, episodes, idx){
    const playBtn = document.getElementById('cc-playpause');
    const timeEl = document.getElementById('cc-time');
    const seek = document.getElementById('cc-seek');
    const muteBtn = document.getElementById('cc-mute');
    const fsBtn = document.getElementById('cc-fullscreen');
    const iconPlay = playBtn.querySelector('.icon-play');
    const iconPause = playBtn.querySelector('.icon-pause');
    const iconVolOn = muteBtn.querySelector('.icon-vol-on');
    const iconVolOff = muteBtn.querySelector('.icon-vol-off');
    let seeking = false;

    function updatePlayIcon(){
      const playing = !video.paused;
      iconPlay.classList.toggle('hidden', playing);
      iconPause.classList.toggle('hidden', !playing);
    }
    function updateVolIcon(){
      iconVolOn.classList.toggle('hidden', video.muted);
      iconVolOff.classList.toggle('hidden', !video.muted);
    }

    // Video chưa play, icon mặc định là "phát" cho tới khi sự kiện onplay thật sự bắn ra
    iconPlay.classList.remove('hidden');
    iconPause.classList.add('hidden');
    updateVolIcon();

    playBtn.onclick = ()=>{
      if(video.paused){ video.play(); } else { video.pause(); }
    };
    video.onplay = updatePlayIcon;
    video.onpause = updatePlayIcon;

    video.onloadedmetadata = ()=>{
      seek.max = video.duration || 0;
      timeEl.textContent = formatTime(0) + ' / ' + formatTime(video.duration);
    };
    video.ontimeupdate = ()=>{
      if(!seeking){
        seek.value = video.currentTime;
        timeEl.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
      }
    };
    seek.oninput = ()=>{ seeking = true; timeEl.textContent = formatTime(seek.value) + ' / ' + formatTime(video.duration); };
    seek.onchange = ()=>{ video.currentTime = seek.value; seeking = false; };

    muteBtn.onclick = ()=>{
      video.muted = !video.muted;
      updateVolIcon();
    };

    fsBtn.onclick = ()=>{
      if(video.requestFullscreen) video.requestFullscreen();
      else if(video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    };

    // Tự chuyển sang tập kế tiếp khi hết tập hiện tại
    video.onended = ()=>{
      if(episodes && idx+1 < episodes.length){
        playEpisode(episodes, idx+1);
      }
    };
  }

  function playEpisode(episodes, idx){
    const e = episodes[idx];
    renderPlayer(e.video_url, episodes, idx);
    document.querySelectorAll('.ep-pill').forEach((el,i)=>{
      el.classList.toggle('active', i===idx);
    });
  }

  function backToLibrary(){
    const video = document.getElementById('video');
    if(video) video.pause();
    document.getElementById('player-container').innerHTML = '';
    document.getElementById('custom-controls').style.display = 'none';
    document.getElementById('player-view').style.display='none';
    document.getElementById('library-view').style.display='block';
    document.getElementById('site-header').classList.remove('compact');
  }

  function escapeHtml(str){
    return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  // Ghi nhận lượt truy cập, trừ thiết bị đã từng đăng nhập admin
  if(localStorage.getItem('bptv_skip_tracking') !== '1'){
    sb.from('page_views').insert({}).then(()=>{}).catch(()=>{});
  }

  loadLibrary();
</script>
</body>
</html>
